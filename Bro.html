<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Neha ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-pink: #ff4d6d;
            --hover-pink: #ff1e56;
            --glass-bg: rgba(255, 255, 255, 0.2);
        }

        body {
            margin: 0;
            height: 100vh;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            color: #fff;
            text-align: center;
        }

        .card {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 30px;
            width: 85%;
            max-width: 400px;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            animation: fadeIn 0.8s ease-out;
        }

        .hidden { display: none; }

        .cursive-text {
            font-family: 'Great Vibes', cursive;
            font-size: 45px;
            margin-bottom: 10px;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.1);
        }

        button {
            padding: 12px 28px;
            margin: 10px;
            border: none;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            background: var(--primary-pink);
            color: white;
            transition: 0.3s transform ease;
            box-shadow: 0 4px 15px rgba(255, 77, 109, 0.4);
        }

        button:hover {
            transform: scale(1.1);
            background: var(--hover-pink);
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        .shake { animation: shake 0.4s; }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }

        .typing-effect {
            font-family: 'Great Vibes', cursive;
            font-size: 32px;
            white-space: nowrap;
            overflow: hidden;
            border-right: 3px solid #fff;
            margin: 20px auto;
            width: fit-content;
            animation: typing 3.5s steps(40, end), blink 0.7s infinite;
        }

        @keyframes typing { from { width: 0 } to { width: 100% } }
        @keyframes blink { 50% { border-color: transparent } }

        .couple-names { font-size: 28px; font-weight: 600; animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }

        .heart-particle {
            position: absolute;
            bottom: -10%;
            animation: floatUp 5s linear infinite;
            pointer-events: none;
        }

        @keyframes floatUp {
            to { transform: translateY(-120vh) rotate(360deg); opacity: 0; }
        }

        img {
            width: 100%;
            max-width: 250px;
            border-radius: 20px;
            margin-top: 20px;
            border: 4px solid white;
        }
    </style>
</head>
<body>

    <div class="card" id="step1">
        <h2>Do you know me? 💭</h2>
        <div class="btn-group">
            <button onclick="nextStep(1, 2)">Yes</button>
            <button onclick="nextStep(1, 2)">Obviously 😌</button>
        </div>
    </div>

    <div class="card hidden" id="step2">
        <h2>Do you love me? ❤️</h2>
        <div class="btn-group">
            <button onclick="startProposal()">Yes</button>
            <button id="noBtn" onclick="shakeButton()">No 😄</button>
        </div>
    </div>

    <div class="card hidden" id="step3">
        <h1 class="cursive-text">I'm going to propose to you 💍</h1>
        <h2>Neha ❤️</h2>
    </div>

    <div class="card hidden" id="step4">
        <h1 class="cursive-text">I LOVE YOU 💖</h1>
        <h2>NEHA 😘</h2>
    </div>

    <div class="card hidden" id="step5">
        <div class="couple-names">Amit ❤️ Neha</div>
        <div class="main-title">Happy Propose Day <span class="ring-icon">💍</span></div>
        <div class="typing-effect">Will you be mine forever, Neha? ❤️</div>

        <div class="image-container">
            <img src="https://i.ibb.co/G41Y0vQx/love.jpg" alt="Love Photo">
        </div>
    </div>

    <audio id="bgm" loop>
        <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_4c9b6b7b3b.mp3" type="audio/mpeg">
    </audio>

    <script>
        function nextStep(current, next) {
            document.getElementById(`step${current}`).classList.add("hidden");
            document.getElementById(`step${next}`).classList.remove("hidden");
        }

        function shakeButton() {
            const btn = document.getElementById("noBtn");
            btn.classList.add("shake");
            setTimeout(() => btn.classList.remove("shake"), 400);
        }

        function startProposal() {
            nextStep(2, 3);
            setTimeout(() => nextStep(3, 4), 4000);
            setTimeout(() => nextStep(4, 5), 7000);
        }

        const bgm = document.getElementById("bgm");
        document.addEventListener("click", () => {
            bgm.play().catch(e => console.log("Audio play blocked"));
        }, { once: true });

        function createHeart() {
            const heart = document.createElement("div");
            heart.className = "heart-particle";
            heart.innerHTML = Math.random() > 0.5 ? "❤️" : "🌹";
            heart.style.left = Math.random() * 100 + "vw";
            heart.style.fontSize = (Math.random() * 20 + 10) + "px";
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 5000);
        }

        setInterval(createHeart, 500);
    </script>
</body>
</html>
